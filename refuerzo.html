<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EnglishAngel Aula — Refuerzo</title>
<meta name="robots" content="noindex,nofollow">
<!-- REINFORCEMENT ENGINE. Reads a frozen spec from the tarea doc. Reuses ejercicio.html engine. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1B2A41;--paper:#EFF1EC;--red:#B23A2E;--gold:#C9962F;--muted:#6B7079;--line:#D8DAD1;
    --serif:'Source Serif 4',Georgia,serif;--sans:'IBM Plex Sans',system-ui,sans-serif;--mono:'IBM Plex Mono',monospace;--hand:'Caveat',cursive;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.55}
  .wrap{max-width:760px;margin:0 auto;padding:28px 20px 80px}
  a{color:var(--red)}
  .masthead{border-bottom:2px solid var(--ink);padding-bottom:14px;margin-bottom:26px}
  .brand{font-family:var(--mono);font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
  .tema{font-family:var(--serif);font-weight:700;font-size:clamp(26px,5vw,38px);line-height:1.1;margin:6px 0 10px}
  .tags{display:flex;flex-wrap:wrap;gap:8px}
  .tag{font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;border:1px solid var(--line);border-radius:999px;padding:3px 10px;color:var(--muted);background:#fff}
  .tag.lvl{border-color:var(--gold);color:var(--gold)}
  section{margin:34px 0}
  .sec-label{font-family:var(--mono);font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .sec-label::after{content:"";flex:1;height:1px;background:var(--line)}
  h2.sec-title{font-family:var(--serif);font-weight:600;font-size:22px;margin:0 0 4px}
  .mini-dialog{background:#fff;border:1px solid var(--line);border-radius:8px;padding:14px 18px;margin-bottom:14px}
  .mini-dialog .mini-line{margin:7px 0;font-size:15px}
  .mini-dialog .mini-who{font-family:var(--mono);font-size:12px;color:var(--red);margin-right:6px}
  .mini-dialog .mini-txt strong{background:rgba(201,150,47,.18);padding:0 3px;border-radius:3px;font-weight:600}
  .diag{background:#fff;border:1px solid var(--line);border-left:4px solid var(--gold);border-radius:8px;padding:18px}
  .diag p.q{font-family:var(--serif);font-size:19px;margin:0 0 14px}
  .diag .opts{display:grid;gap:10px}
  .opt-btn{text-align:left;font-family:var(--sans);font-size:16px;background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:12px 14px;cursor:pointer;transition:.12s}
  .opt-btn:hover{border-color:var(--ink)}
  .opt-btn.ok{border-color:#2f7d4f;background:#eef7f0}
  .opt-btn.no{border-color:var(--red);background:#faeeec}
  .diag .feedback{margin-top:12px;font-family:var(--hand);font-size:21px;color:var(--red);min-height:24px}
  .diag .feedback.good{color:#2f7d4f}
  .pragmatic{font-family:var(--serif);font-size:18px;font-style:italic;border-left:3px solid var(--red);padding:2px 0 2px 16px;margin:20px 0;color:var(--ink)}
  .gtab{width:100%;border-collapse:collapse;margin:8px 0 4px;background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .gtab caption{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);text-align:left;padding:8px 12px 2px}
  .gtab th{font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--red);text-align:left;padding:8px 12px;border-bottom:2px solid var(--line)}
  .gtab td{font-family:var(--serif);font-size:16px;padding:8px 12px;border-bottom:1px solid var(--line)}
  .gtab td:nth-child(2){color:var(--red);font-weight:600}
  .vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
  .vcard{background:#fff;border:1px solid var(--line);border-radius:8px;padding:12px;text-align:center}
  .vcard .flag{font-size:30px;line-height:1}
  .vcard .pais{font-family:var(--serif);font-weight:600;font-size:16px;margin-top:4px}
  .vcard .nac{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:2px}
  .vcard .word{font-family:var(--serif);font-weight:600;font-size:17px}
  .vcard .trad{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:2px}
  .ex{background:#fff;border:1px solid var(--line);border-radius:8px;padding:16px;margin:14px 0}
  .ex .stage{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
  .ex .joined{font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--red);background:#faeeec;border:1px solid var(--line);border-radius:6px;padding:3px 8px;display:inline-block;margin-bottom:8px}
  .ex .prompt{font-size:16px;margin:0 0 12px}
  .ex .instr{font-family:var(--mono);font-size:12px;color:var(--muted);margin-bottom:8px}
  .ex .base{font-family:var(--serif);font-size:17px;margin:4px 0 10px}
  .scrambled{font-family:var(--serif);font-size:19px;margin:4px 0 12px}
  .scrambled span{display:inline-block;background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:3px 9px;margin:3px}
  input[type=text]{font-family:var(--sans);font-size:16px;padding:9px 11px;border:1px solid var(--line);border-radius:7px;width:100%;background:var(--paper);color:var(--ink)}
  input[type=text]:focus{outline:none;border-color:var(--ink);background:#fff}
  .inline-gap{display:inline-block;width:clamp(90px,28%,160px)}
  .choices{display:grid;gap:8px}
  .choice{display:flex;align-items:center;gap:10px;background:var(--paper);border:1px solid var(--line);border-radius:7px;padding:10px 12px;cursor:pointer}
  .choice input{accent-color:var(--red)}
  .tf-btns{display:flex;gap:10px}
  .tf-btns button{flex:1;font-family:var(--sans);font-size:15px;padding:10px;border:1px solid var(--line);border-radius:7px;background:var(--paper);cursor:pointer}
  .tf-btns button.sel{border-color:var(--ink);background:#fff;font-weight:600}
  .mark{font-family:var(--hand);font-size:22px;margin-top:8px;min-height:26px}
  .mark.right{color:#2f7d4f}.mark.wrong{color:var(--red)}
  .mark .sol{font-family:var(--sans);font-size:13px;color:var(--muted);display:block;margin-top:2px}
  .mark .alt{font-family:var(--sans);font-size:12.5px;color:var(--gold);display:block;margin-top:2px;font-style:italic}
  .audio-box{background:var(--ink);color:var(--paper);border-radius:10px;padding:18px}
  .audio-box .play{font-family:var(--sans);font-weight:600;font-size:15px;background:var(--gold);color:var(--ink);border:none;border-radius:8px;padding:11px 18px;cursor:pointer}
  .audio-box .play:disabled{opacity:.5;cursor:default}
  .audio-box .hint{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;opacity:.7;margin-top:10px}
  .transcript{margin-top:14px}
  .transcript .line{margin:6px 0;font-size:15px}
  .transcript .who{font-family:var(--mono);font-size:12px;color:var(--gold);margin-right:6px}
  .transcript .line.active{background:rgba(201,150,47,.18);border-radius:5px;padding:2px 6px}
  .transcript .blank{font-family:var(--mono);font-weight:500;font-size:13px;color:var(--gold);border-bottom:1px solid var(--gold);padding:0 2px}
  .listen-sub{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--red);margin:22px 0 4px}
  .reading-text{background:#fff;border:1px solid var(--line);border-radius:8px;padding:18px;font-family:var(--serif);font-size:17px;line-height:1.7}
  .controls{position:sticky;bottom:0;background:linear-gradient(transparent,var(--paper) 30%);padding:20px 0 4px;margin-top:30px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .btn{font-family:var(--sans);font-weight:600;font-size:15px;border:none;border-radius:8px;padding:12px 22px;cursor:pointer}
  .btn.primary{background:var(--red);color:#fff}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .score{font-family:var(--mono);font-size:14px;color:var(--muted)}
  .score b{color:var(--ink)}
  .cta-sp{display:none;margin-top:14px;padding:14px 16px;background:#fff;border:1px solid var(--gold);border-left:4px solid var(--gold);border-radius:8px;font-family:var(--sans);font-size:14px;line-height:1.5}
  .cta-sp a{color:var(--red);font-weight:600;text-decoration:underline;text-underline-offset:2px}
  footer{margin-top:50px;border-top:1px solid var(--line);padding-top:16px;font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--muted);text-align:center}
  .empty{font-family:var(--serif);font-size:18px;color:var(--muted);text-align:center;padding:60px 0}
  .related{margin-top:40px;border-top:1px solid var(--line);padding-top:16px}
  .related h3{font-family:var(--mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--red);margin:0 0 10px}
  .related a{display:inline-block;font-family:var(--sans);font-size:14px;color:var(--ink);text-decoration:none;border:1px solid var(--line);border-radius:999px;padding:5px 12px;margin:0 6px 6px 0}
  .related a:hover{border-color:var(--ink)}
  .modebar{display:flex;gap:8px;margin-top:12px}
  .modebar a{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;text-decoration:none;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:4px 12px;background:#fff}
  .modebar a:hover{border-color:var(--ink);color:var(--ink)}
  .modebar a.on{border-color:var(--red);color:var(--red);font-weight:600}
  .print-btn{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;background:transparent;border:1px solid var(--line);border-radius:999px;padding:4px 12px;color:var(--muted);cursor:pointer;margin:6px 0 0}
  .print-btn:hover{border-color:var(--ink);color:var(--ink)}
  @media print{
    .modebar,.controls,footer,.print-btn,.cta-sp{display:none!important}
    body.print-tabla section{display:none}
    body.print-tabla section.sec-inicio{display:block}
    body.print-tabla section.sec-inicio>*{display:none}
    body.print-tabla section.sec-inicio .gtab{display:table;width:100%}
  }
</style>

<body>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="config.js"></script>
<script src="comun.js"></script>
<script>
(async function(){
  if(document.readyState==='loading') await new Promise(r=>document.addEventListener('DOMContentLoaded',r));
  const P=new URLSearchParams(location.search);
  const token=P.get('t'), tareaId=P.get('tarea');
  const app=document.getElementById('app');
  const fail=m=>{app.innerHTML='<div style="padding:30px;color:var(--muted);font-style:italic">'+m+'</div>';};
  if(!token||!tareaId) return fail('Link inválido — abre el refuerzo desde tu aula.');
  const backUrl='estudiante.html?t='+encodeURIComponent(token);
  const estRef=db.collection('estudiantes').doc(token);
  let tarea=null;
  try{
    const snap=await estRef.collection('tareas').doc(tareaId).get();
    if(!snap.exists) throw new Error('no existe');
    tarea=snap.data();
  }catch(e){ return fail('No se pudo cargar el refuerzo. Revisa tu conexión e intenta de nuevo.'); }
  const spec=tarea.refuerzo;
  if(!spec || !Array.isArray(spec.ejercicios) || !spec.ejercicios.length) return fail('Este refuerzo no tiene ejercicios.');
  const isPlacement = spec.tipo==='placement';
  const nivel = tarea.nivel||'';
  window.SEQUENCE_DATA={
    tema: tarea.titulo || (isPlacement?'Diagnóstico de nivel':'🎯 Refuerzo automático'),
    nivel: isPlacement?'Placement':(nivel||''),
    habilidades:[],
    fases:{ practica:{ ejercicios: spec.ejercicios } }
  };
  let docRef=null, best=-1;
  window.EA_ONGRADE=async function(res){
    if(!res.ans) return;
    const score=Math.round(100*res.ok/res.ans);
    let sug='';
    if(isPlacement){
      const orden=['A1','A2','B1','B2','C1','C2'];
      orden.forEach(n=>{ const b=res.por_area&&res.por_area['Nivel '+n]; if(b&&b.total&&(b.ok/b.total)>=0.7) sug=n; });
    }
    try{
      const base={temaId:'', tema:window.SEQUENCE_DATA.tema, area:'', nivel:isPlacement?'':(nivel||''),
        tipo:isPlacement?'placement':'refuerzo', tareaId:tareaId, score:score,
        aciertos:res.ok, respondidas:res.ans, total_items:res.total, por_etapa:res.por_etapa||{},
        por_area:res.por_area||{}, origen:'refuerzo',
        comentario: sug?('Nivel sugerido: '+sug):'', nivel_sugerido:sug, fecha:FV.serverTimestamp()};
      const col=estRef.collection('resultados');
      if(!docRef){ docRef=await col.add(base); }
      else if(score>=best){ await docRef.update(base); }
      best=Math.max(best,score);
      try{ await estRef.collection('tareas').doc(tareaId).update({estado:'hecha'}); }catch(e){}
      toast(isPlacement?('✓ Diagnóstico guardado'+(sug?' — nivel sugerido: '+sug:'')):('✓ Guardado en tu aula: '+score+'%'));
    }catch(e){ console.error(e); toast('No se pudo guardar — revisa tu conexión'); }
  };
  window.__EA_RUN();
  const top=document.createElement('a'); top.href=backUrl; top.textContent='← Mi aula';
  top.style.cssText='font-family:var(--mono);font-size:13px;display:inline-block;margin-bottom:10px';
  app.insertBefore(top, app.firstChild);
})();
</script>
<div class="wrap" id="app"><div class="empty">No content loaded.</div></div>
<script>
window.__EA_RUN=function(){
  const D=window.SEQUENCE_DATA, app=document.getElementById('app');
  if(!D) return; app.innerHTML='';
  function normalize(s){ if(s==null)return''; s=String(s).toLowerCase().trim();
    const c={"i'm":"i am","you're":"you are","he's":"he is","she's":"she is","it's":"it is","we're":"we are","they're":"they are","isn't":"is not","aren't":"are not","don't":"do not","doesn't":"does not","didn't":"did not","can't":"cannot","won't":"will not","i've":"i have","you've":"you have","we've":"we have","they've":"they have","that's":"that is","what's":"what is"};
    for(const k in c){s=s.replace(new RegExp("\\b"+k.replace("'","'?")+"\\b","g"),c[k]);}
    s=s.replace(/[‘’`]/g,"'").normalize('NFD').replace(/[̀-ͯ]/g,'');
    return s.replace(/[.,;:!?]/g,'').replace(/\s+/g,' ').trim(); }
  function eq(a,b){return normalize(a)===normalize(b);}
  const graders=[];
  function el(t,c,h){const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;}
  function esc(s){return String(s).replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function section(label,title){const s=el('section');s.appendChild(el('div','sec-label',label));if(title)s.appendChild(el('h2','sec-title',title));return s;}

  const mh=el('div','masthead');
  mh.appendChild(el('div','brand','EnglishAngel · Exercise bank'));
  mh.appendChild(el('h1','tema',esc(D.tema)));
  const tags=el('div','tags'); tags.appendChild(el('span','tag lvl',D.nivel));
  (D.habilidades||[]).forEach(h=>tags.appendChild(el('span','tag',h)));
  // Estimated class time: warm-up + ~1.2 min per graded item + listening + reading
  (function(){const F0=D.fases||{};let n=(F0.practica&&F0.practica.ejercicios||[]).length;
    let est=(F0.inicio?6:0)+n*1.2+(F0.listening&&F0.listening.guion?8:0)+(F0.reading&&F0.reading.texto?6:0);
    if(est>0)tags.appendChild(el('span','tag','≈ '+(Math.round(est/5)*5)+' min class'));})();
  mh.appendChild(tags);
  // Mode bar: every page is an entry point to the full sequence (lesson + practice + test)
  if(D.id){const mb=el('div','modebar');
    [['📖 Lesson','../leccion/'],['✏️ Practice','../preview/'],['✓ Test','../evaluacion/']].forEach(([lbl,dir])=>{
      const a=el('a',dir==='../preview/'?'on':null,lbl);a.href=dir+D.id+'.html';mb.appendChild(a);});
    mb.appendChild(el('a',null,'🎲 Exercise Generator')).href='../herramientas/generador-ejercicios.html';
    mb.appendChild(el('a',null,'🧩 Class Generator')).href='../herramientas/generador-clases.html';
    mb.appendChild(el('a',null,'✦ 3D Map')).href='../herramientas/mapa-3d.html';
    mh.appendChild(mb);}
  app.appendChild(mh);

  const F=D.fases||{};

  if(F.inicio){
    const s=section('01 · Warm-up — Diagnosis','Which one sounds right?');
    s.classList.add('sec-inicio');
    if(Array.isArray(F.inicio.interaccion)&&F.inicio.interaccion.length){
      const dlg=el('div','mini-dialog');
      F.inicio.interaccion.forEach(l=>{const i=l.indexOf(': ');
        const row=el('div','mini-line');
        if(i>0){row.appendChild(el('span','mini-who',esc(l.slice(0,i))+':'));row.appendChild(el('span','mini-txt',esc(l.slice(i+2)).replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')));}
        else row.appendChild(el('span','mini-txt',esc(l)));
        dlg.appendChild(row);});
      s.appendChild(dlg);
    }
    const b=F.inicio.banner_diagnostico;
    if(b){
      const box=el('div','diag'); box.appendChild(el('p','q','Choose the correct option:'));
      const opts=el('div','opts');
      [['a',b.opcion_a],['b',b.opcion_b]].forEach(([k,txt])=>{
        const btn=el('button','opt-btn',esc(txt));
        btn.onclick=()=>{const fb=box.querySelector('.feedback');box.querySelectorAll('.opt-btn').forEach(x=>x.disabled=true);
          if(k===b.correcta){btn.classList.add('ok');fb.className='feedback good';fb.textContent='Exactly! That is the correct form.';}
          else{btn.classList.add('no');box.querySelectorAll('.opt-btn')[b.correcta==='a'?0:1].classList.add('ok');fb.className='feedback';fb.textContent='Careful — that is the typical mistake. The other one is correct.';}};
        opts.appendChild(btn);
      });
      box.appendChild(opts); box.appendChild(el('div','feedback','')); s.appendChild(box);
    }
    if(F.inicio.definicion_pragmatica) s.appendChild(el('p','pragmatic','“'+esc(F.inicio.definicion_pragmatica)+'”'));
    if(F.inicio.tabla && Array.isArray(F.inicio.tabla.filas)){
      const T=F.inicio.tabla;
      const head=(T.encabezados||[]).map(h=>'<th>'+esc(h)+'</th>').join('');
      const rows=T.filas.map(r=>'<tr>'+r.map(c=>'<td>'+esc(c)+'</td>').join('')+'</tr>').join('');
      const tbl=el('table','gtab');
      tbl.innerHTML=(T.titulo?'<caption>'+esc(T.titulo)+'</caption>':'')+'<thead><tr>'+head+'</tr></thead><tbody>'+rows+'</tbody>';
      s.appendChild(tbl);
      // Printable reference table — teachers search for "tabla del verbo to be" etc.
      const pbtn=el('button','print-btn','🖨 Print reference table');
      pbtn.onclick=()=>{document.body.classList.add('print-tabla');window.print();};
      window.addEventListener('afterprint',()=>document.body.classList.remove('print-tabla'));
      s.appendChild(pbtn);
    }
    if(F.inicio.vocab_warmup && Array.isArray(D.vocabulario) && D.vocabulario.length){
      const grid=el('div','vocab-grid');
      D.vocabulario.forEach(v=>{const card=el('div','vcard');
        if(v.bandera) card.appendChild(el('div','flag',v.bandera));
        if(v.pais){card.appendChild(el('div','pais',esc(v.pais)));if(v.nacionalidad)card.appendChild(el('div','nac',esc(v.nacionalidad)));}
        else if(v.palabra){card.appendChild(el('div','word',esc(v.palabra)));if(v.traduccion)card.appendChild(el('div','trad',esc(v.traduccion)));}
        grid.appendChild(card);});
      s.appendChild(grid);
    }
    app.appendChild(s);
  }

  if(F.practica && Array.isArray(F.practica.ejercicios) && F.practica.ejercicios.length){
    const s=section('02 · Practice','Exercises');
    F.practica.ejercicios.forEach((ex,i)=>s.appendChild(renderExercise(ex,i)));
    app.appendChild(s);
  }

  if(F.listening && Array.isArray(F.listening.guion) && F.listening.guion.length){
    const s=section('03 · Listening','Listen and answer');
    s.appendChild(renderListening(F.listening)); app.appendChild(s);
  }

  if(F.reading && F.reading.texto){
    const s=section('04 · Reading','Read and answer');
    s.appendChild(el('div','reading-text',esc(F.reading.texto)));
    (F.reading.preguntas||[]).forEach((p,i)=>s.appendChild(renderExercise({tipo:'true_false',afirmacion:p.afirmacion,respuesta:p.respuesta},'r'+i)));
    app.appendChild(s);
  }

  const ctr=el('div','controls');
  const check=el('button','btn primary','Check answers');
  const reset=el('button','btn ghost','Reset');
  const score=el('div','score','');
  // Grades ONLY answered items: teachers can assign a subset without unanswered ones counting as wrong.
  check.onclick=()=>{let ok=0,ans=0;const det={};const pa={};
    graders.forEach(g=>{
      if(g.answered && !g.answered()){ if(g.clear)g.clear(); return; }
      ans++; const r=g.check(); g.reveal(r); if(r)ok++;
      const e=g.etapa||'Other'; det[e]=det[e]||{ok:0,total:0}; det[e].total++; if(r)det[e].ok++; const ar=g.area||''; if(ar){pa[ar]=pa[ar]||{ok:0,total:0}; pa[ar].total++; if(r)pa[ar].ok++;}});
    if(!graders.length){score.innerHTML='';return;}
    if(!ans){score.innerHTML='Nothing answered yet — try a few first.';return;}
    score.innerHTML=`Score: <b>${ok}/${ans}</b> answered`+(ans<graders.length?` <span style="color:var(--muted)">· ${graders.length} total</span>`:'');
    cta.style.display='block';
    if(window.EA_ONGRADE)window.EA_ONGRADE({ok,ans,total:graders.length,por_etapa:det,por_area:pa});};
  reset.onclick=()=>location.reload();
  ctr.appendChild(check);ctr.appendChild(reset);ctr.appendChild(score);app.appendChild(ctr);
  const cta=el('div','cta-sp','Great work! <a href="#" id="ea-back">← Back to my classroom</a>');
  app.appendChild(cta);
  app.appendChild(el('footer','','EnglishAngel Aula — your private classroom with Felipe.'));

  function renderExercise(ex,idx){
    const box=el('div','ex');
    const stageMap={multiple_choice:'Recognize',true_false:'Recognize',gap_fill:'Manipulate',unscramble:'Manipulate',correct_mistake:'Manipulate',transformation:'Transform',write_opposite:'Transform',short_answer_production:'Produce'};
    box.appendChild(el('div','stage',stageMap[ex.tipo]||'Exercise'));
    if(Array.isArray(ex.combina) && ex.combina.length) box.appendChild(el('div','joined','🔗 Combines: '+ex.combina.map(esc).join(' + ')));
    let getVal,correct,markEl=el('div','mark','');
    switch(ex.tipo){
      case 'multiple_choice':{
        box.appendChild(el('p','prompt',esc(ex.pregunta).replace(/___/g,'<b>_____</b>')));
        const ch=el('div','choices');
        (ex.opciones||[]).forEach(o=>{const lab=el('label','choice');lab.innerHTML=`<input type="radio" name="mc${idx}" value="${esc(o)}"> <span>${esc(o)}</span>`;ch.appendChild(lab);});
        box.appendChild(ch);getVal=()=>{const r=box.querySelector(`input[name=mc${idx}]:checked`);return r?r.value:'';};correct=ex.respuesta;break;}
      case 'true_false':{
        box.appendChild(el('p','prompt',esc(ex.afirmacion)));
        const tf=el('div','tf-btns');let sel='';
        ['true','false'].forEach(v=>{const btn=el('button',null,'');btn.textContent=v==='true'?'✔ True':'✗ False';btn.onclick=()=>{sel=v;tf.querySelectorAll('button').forEach(x=>x.classList.remove('sel'));btn.classList.add('sel');};tf.appendChild(btn);});
        box.appendChild(tf);getVal=()=>sel;correct=String(ex.respuesta);break;}
      case 'gap_fill':{
        const parts=esc(ex.texto).split('___');const p=el('p','prompt');const inp=el('input');inp.type='text';inp.className='inline-gap';
        p.innerHTML=parts[0];p.appendChild(inp);p.insertAdjacentHTML('beforeend',parts[1]||'');box.appendChild(p);
        getVal=()=>inp.value;correct=ex.respuesta;break;}
      case 'unscramble':{
        box.appendChild(el('div','instr','Put the words in order to make a correct sentence.'));
        const sc=el('div','scrambled');const ws=(ex.palabras||[]).slice();for(let i=ws.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[ws[i],ws[j]]=[ws[j],ws[i]];}if(ws.length>2&&ws.join(' ')===(ex.palabras||[]).join(' '))ws.push(ws.shift());ws.forEach(w=>sc.appendChild(el('span',null,esc(w))));box.appendChild(sc);
        const inp=el('input');inp.type='text';inp.placeholder='Write the ordered sentence…';box.appendChild(inp);getVal=()=>inp.value;correct=ex.respuesta;break;}
      case 'correct_mistake':{
        box.appendChild(el('div','instr','There is a mistake. Rewrite the correct sentence.'));
        box.appendChild(el('div','base','✗ '+esc(ex.texto_con_error)));
        const inp=el('input');inp.type='text';inp.placeholder='Corrected version…';box.appendChild(inp);getVal=()=>inp.value;correct=ex.respuesta;break;}
      case 'transformation':
      case 'write_opposite':{
        box.appendChild(el('div','instr',esc(ex.instruccion||'')));
        box.appendChild(el('div','base',esc(ex.oracion_base)));
        const inp=el('input');inp.type='text';inp.placeholder='Your answer…';box.appendChild(inp);getVal=()=>inp.value;correct=ex.respuesta;break;}
      case 'short_answer_production':{
        box.appendChild(el('p','prompt',esc(ex.pregunta)));
        const inp=el('input');inp.type='text';inp.placeholder='Answer in a full sentence…';box.appendChild(inp);getVal=()=>inp.value;correct=ex.respuesta;break;}
      default: box.appendChild(el('p','prompt','[Unsupported type: '+esc(ex.tipo)+']'));getVal=()=>'';correct='';
    }
    box.appendChild(markEl);
    graders.push({etapa:stageMap[ex.tipo]||'Other',area:ex._area||'',check:()=>eq(getVal(),correct),
      answered:()=>String(getVal()||'').trim()!=='',
      clear:()=>{markEl.className='mark';markEl.innerHTML='';},
      reveal:(ok)=>{markEl.className='mark '+(ok?'right':'wrong');markEl.innerHTML=(ok?'✓ Correct!':'✗ Not quite<span class="sol">Answer: '+esc(correct)+'</span>')+(ex.tambien_valido?'<span class="alt">Also correct: '+esc(ex.tambien_valido)+'</span>':'');}});
    return box;
  }

  function renderListening(L){
    const wrapEl=el('div');
    const box=el('div','audio-box');
    const play=el('button','play','▶ Play dialogue');box.appendChild(play);
    box.appendChild(el('div','hint','Listen first. The transcript has gaps: fill them by listening.'));
    const tr=el('div','transcript');
    const gaps=Array.isArray(L.gaps)?L.gaps.slice():[]; const used=new Array(gaps.length).fill(false);
    const lines=L.guion.map(g=>{
      const idx=g.indexOf(':'); const who=idx>0?g.slice(0,idx):''; const spoken=idx>0?g.slice(idx+1).trim():g;
      let shown=esc(spoken);
      gaps.forEach((w,gi)=>{if(used[gi])return;const re=new RegExp('\\b'+String(w).replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b','i');if(re.test(shown)){shown=shown.replace(re,'<span class="blank">('+(gi+1)+') _____</span>');used[gi]=true;}});
      const line=el('div','line'); if(who)line.innerHTML='<span class="who">'+esc(who)+'</span>'; line.insertAdjacentHTML('beforeend',shown); tr.appendChild(line);
      return {txt:spoken,node:line};
    });
    box.appendChild(tr); wrapEl.appendChild(box);
    play.onclick=()=>{ if(!('speechSynthesis' in window)){alert('Your browser does not support speech synthesis.');return;}
      window.speechSynthesis.cancel(); play.disabled=true; let i=0;
      const speakNext=()=>{ tr.querySelectorAll('.line').forEach(l=>l.classList.remove('active'));
        if(i>=lines.length){play.disabled=false;play.textContent='▶ Play again';return;}
        lines[i].node.classList.add('active');
        const u=new SpeechSynthesisUtterance(lines[i].txt);u.lang='en-US';u.rate=.95;
        u.onend=()=>{i++;speakNext();};u.onerror=()=>{i++;speakNext();};window.speechSynthesis.speak(u);};
      speakNext();};
    if(gaps.length){
      wrapEl.appendChild(el('div','listen-sub','Fill in the missing words'));
      gaps.forEach((g,i)=>{const ex=el('div','ex');ex.appendChild(el('div','stage','Completion'));
        ex.appendChild(el('div','instr','Gap ('+(i+1)+') in the transcript — write it as you hear it:'));
        const inp=el('input');inp.type='text';inp.placeholder='Word…';ex.appendChild(inp);const mk=el('div','mark','');ex.appendChild(mk);
        graders.push({etapa:'Listening',check:()=>eq(inp.value,g),
          answered:()=>inp.value.trim()!=='',
          clear:()=>{mk.className='mark';mk.innerHTML='';},
          reveal:(ok)=>{mk.className='mark '+(ok?'right':'wrong');mk.innerHTML=ok?'✓ Correct!':'✗ Not quite<span class="sol">Answer: '+esc(g)+'</span>';}});
        wrapEl.appendChild(ex);});
    }
    if(Array.isArray(L.comprension) && L.comprension.length){
      wrapEl.appendChild(el('div','listen-sub','Did you understand the dialogue?'));
      L.comprension.forEach((q,i)=>wrapEl.appendChild(renderExercise({tipo:'multiple_choice',pregunta:q.pregunta,opciones:q.opciones,respuesta:q.respuesta},'lc'+i)));
    }
    return wrapEl;
  }
};
